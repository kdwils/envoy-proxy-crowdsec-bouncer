# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: envoy-proxy-bouncer

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

changelog:
  use: github
  sort: asc
  format: "{{ .Message }} (@{{ .AuthorUsername }})"
  filters:
    exclude:
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
      - "^typo"
      - "^verbiage"
      - "^remove typo"
      - "^remove optional tag"
      - "^version bumps"
  groups:
    - title: "Features"
      regexp: "^(Feature|feature|feat).*?$"
      order: 0
    - title: "Bug Fixes"
      regexp: "^(Bugfix|bugfix|fix).*?$"
      order: 1
    - title: "Documentation"
      regexp: "^(Docs|docs|documentation).*?$"
      order: 2
    - title: "Maintenance"
      regexp: "^(Chore|chore).*?$"
      order: 3
    - title: "Dependency Updates"
      regexp: "^(Bump|bump).*?$"
      order: 4
    - title: "Other Changes"
      order: 999

release:
  github:
    owner: kdwils
    name: envoy-proxy-crowdsec-bouncer
  header: |
    # New Features

    ### Disable in-memory captcha challenge replay protection

    By default, the bouncer stores issued challenge tokens in memory and deletes them on first use. This can break in multi-pod environments or after restarts.

    When disabled, the bouncer relies solely on JWT signature, IP binding, and expiry for protection. Challenge tokens can be reused if this is disabled — lower `challengeDuration` to reduce the window for abuse.

    See [CONFIGURATION.md — CAPTCHA](docs/CONFIGURATION.md#captcha) for configuration options.

    Helm chart values: [`config.captcha.disableChallengeReplayProtection`](charts/envoy-proxy-bouncer/values.yaml#L119)

    ---

    ### Disable the denied HTML page

    When disabled, the bouncer returns the response status code with an empty body instead of a rendered HTML ban page.

    See [CONFIGURATION.md — Templates](docs/CONFIGURATION.md#templates) for configuration options.

    Helm chart values: [`config.templates.showDeniedPage`](charts/envoy-proxy-bouncer/values.yaml#L133)

    ---

    ### Prometheus metrics scraping endpoint

    When enabled, an HTTP server is started on the configured port exposing a `/metrics` endpoint in Prometheus text format, compatible with both Prometheus and VictoriaMetrics.

    See [METRICS.md](docs/METRICS.md) for available metrics and scrape configuration examples.

    See [CONFIGURATION.md — Prometheus](docs/CONFIGURATION.md#prometheus) for configuration options.

    Helm chart values: [`config.prometheus`](charts/envoy-proxy-bouncer/values.yaml#L78) — includes `serviceMonitor` support for automatic Prometheus Operator discovery.

    ---

    ### Grafana dashboard

    A Grafana dashboard is included in the Helm chart and can be provisioned automatically via a ConfigMap sidecar.

    Helm chart values: [`grafana.dashboard`](charts/envoy-proxy-bouncer/values.yaml#L172)

    # Changed Behavior

    ### INFO level logging no longer logs allowed requests

    This behavior was changed due to the verbosity of the previous INFO level logger. Using DEBUG level will now result in similar output to the previous INFO level. Denied requests are still logged at INFO.

    Example denied log:
    ```json
    {"time":"2026-03-31T21:43:37.908735094Z","level":"INFO","msg":"request denied","ip":"1.1.1.1","action":"ban","reason":"http:scan"}
    ```

    # Bug Fixes

    - Fixed an issue where the number of active decisions displayed in the bouncer metrics view on the CrowdSec dashboard was inaccurate
  footer: |
    **Full Changelog**: https://github.com/kdwils/envoy-proxy-crowdsec-bouncer/compare/{{ .PreviousTag }}...{{ .Tag }}
