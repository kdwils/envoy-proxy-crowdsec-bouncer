{{- if .Values.grafana.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "envoy-proxy-bouncer.fullname" . }}-dashboard
  labels:
    {{- include "envoy-proxy-bouncer.labels" . | nindent 4 }}
    {{- with .Values.grafana.dashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if .Values.grafana.dashboard.folder }}
  annotations:
    grafana_folder: {{ .Values.grafana.dashboard.folder | quote }}
  {{- end }}
data:
  bouncer.json: |
    {{- .Files.Get "dashboards/bouncer.json" | nindent 4 }}
{{- end }}
