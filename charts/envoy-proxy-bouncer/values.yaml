replicaCount: 1 # @schema default: 1

image:
  repository: ghcr.io/kdwils/envoy-proxy-bouncer # @schema default: "ghcr.io/kdwils/envoy-proxy-bouncer"
  pullPolicy: IfNotPresent # @schema default: "IfNotPresent"
  tag: "" # @schema default: ".Chart.AppVersion"

imagePullSecrets: []
nameOverride: "" # @schema default: ""
fullnameOverride: "" # @schema default: ""

serviceAccount:
  create: true # @schema default: true
  name: "" # @schema default: ""

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - all
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP # @schema default: ClusterIP
  grpcPort: 8080 # @schema default: 8080
  httpPort: 8081 # @schema default: 8081
  # sessionAffinity enables client IP-based session affinity on the Service, ensuring that requests from the same
  # client IP are routed to the same pod. This is useful in multi-pod deployments to ensure that captcha challenge
  # tokens stored in the pod's in-memory cache are reachable for both challenge creation (gRPC) and verification
  # (HTTP) without requiring an external shared cache. Set to ClientIP to enable, and optionally configure
  # sessionAffinityConfig.clientIP.timeoutSeconds (Kubernetes default is 10800). The timeout should be at least
  # the value of config.captcha.challengeDuration. Does not protect against pod restarts; see
  # config.captcha.disableChallengeReplayProtection for that case.
  sessionAffinity: None # @schema default: None
  sessionAffinityConfig: # @schema type: object
    clientIP: # @schema type: object
      timeoutSeconds: 0 # @schema default: 0

resources:
  limits:
    cpu: 100m
    memory: 128Mi

config:
  server:
    grpcPort: 8080 # @schema default: 8080
    httpPort: 8081 # @schema default: 8081
    logLevel: "info" # @schema default: "info"

  trustedProxies: [] # @schema default: []

  bouncer:
    enabled: true # @schema default: true
    metrics: false # @schema default: false
    metricsInterval: "10m" # @schema default: "10m"
    lapiURL: "" # @schema default: "http://crowdsec-service:8080"
    tickerInterval: "10s" # @schema default: "10s"
    apiKey: "" # @schema default: ""
    apiKeySecretRef: # @schema type: object
      name: "" # @schema default: ""
      key: "" # @schema default: ""

    tlsSecretRef: # @schema type: object
      name: "" # @schema default: ""
      certKey: "tls.crt" # @schema default: "tls.crt"
      keyKey: "tls.key" # @schema default: "tls.key"
      caKey: "ca.crt" # @schema default: "ca.crt"

    # the default paths are where the secret is mounted, do not change these unless mounting the certs another way
    tls: # @schema type: object
      enabled: false # @schema default: false
      certPath: "/app/tls/tls.crt" # @schema default: "/app/tls/tls.crt"
      keyPath: "/app/tls/tls.key" # @schema default: "/app/tls/tls.key"
      caPath: "/app/tls/ca.crt" # @schema default: "/app/tls/ca.crt"
      insecureSkipVerify: false # @schema default: false

  waf:
    enabled: false # @schema default: false
    appSecURL: "" # @schema default: "http://crowdsec-appsec-service:7422"
    apiKey: "" # @schema default: ""
    apiKeySecretRef: # @schema type: object
      name: "" # @schema default: ""
      key: "" # @schema default: ""

  # enable endpoint for prometheus metrics scraping on the configured port
  prometheus:
    enabled: false # @schema default: false
    port: 9090 # @schema default: 9090
    serviceMonitor:
      enabled: false # @schema default: false
      interval: "30s" # @schema default: "30s"
      scrapeTimeout: "10s" # @schema default: "10s"
      # labels that match your Prometheus instance's serviceMonitorSelector
      # e.g. if your Prometheus has serviceMonitorSelector: matchLabels: release: prometheus
      # set prometheusMatchLabels: {release: prometheus}
      prometheusMatchLabels: {} # @schema default: {}

  captcha:
    enabled: false # @schema default: false
    provider: "" # @schema default: ""
    siteKey: "" # @schema default: ""
    secretKey: "" # @schema default: ""
    secretKeySecretRef: # @schema type: object
      name: "" # @schema default: ""
      key: "" # @schema default: ""
    signingKey: "" # @schema default: ""
    signingKeySecretRef: # @schema type: object
      name: "" # @schema default: ""
      key: "" # @schema default: ""
    timeout: "10s" # @schema default: "10s"
    challengeDuration: "5m" # @schema default: "5m"
    sessionDuration: "15m" # @schema default: "15m"
    callbackURL: "" # @schema default: ""
    cookieDomain: "" # @schema default: ""
    cookieName: "" # @schema default: ""
    secureCookie: true # @schema default: true

    # disableChallengeReplayProtection disables the in-memory check that prevents a challenge token from being used
    # more than once. By default, challenge tokens are single-use: the bouncer stores each issued challenge token in
    # memory and deletes it on first use. This works correctly for single-pod deployments but can break in multi
    # por environments or restart because it is stored in-memory. Enabling this option
    # removes the single-use check, relying solely on the challenge token's JWT signature, IP binding, and expiry
    # for protection. Set challengeDuration to the shortest acceptable value when this is enabled.
    disableChallengeReplayProtection: false # @schema default: false

  webhook:
    subscriptions: [] # @schema default: []
    signingKey: "" # @schema default: ""
    signingKeySecretRef: # @schema type: object
      name: "" # @schema default: ""
      key: "" # @schema default: ""
    timeout: "5s" # @schema default: "5s"
    bufferSize: 100 # @schema default: 100

  templates:
    deniedTemplatePath: "" # @schema default: ""
    deniedTemplateHeaders: "" # @schema default: ""
    showDeniedPage: true # @schema default: true
    captchaTemplatePath: "" # @schema default: ""
    captchaTemplateHeaders: "" # @schema default: ""

probes:
  liveness:
    enabled: true # @schema default: true
    initialDelaySeconds: 5 # @schema default: 5
    periodSeconds: 5 # @schema default: 5
    timeoutSeconds: 5 # @schema default: 5
    failureThreshold: 3 # @schema default: 3
  readiness:
    enabled: true # @schema default: true
    initialDelaySeconds: 5 # @schema default: 5
    periodSeconds: 5 # @schema default: 5
    timeoutSeconds: 5 # @schema default: 5
    failureThreshold: 3 # @schema default: 3

autoscaling:
  enabled: false # @schema default: false
  minReplicas: 1 # @schema default: 1
  maxReplicas: 10 # @schema default: 10
  targetCPUUtilizationPercentage: 80 # @schema default: 80
  targetMemoryUtilizationPercentage: 80 # @schema default: 80

httproute:
  enabled: false # @schema default: false
  annotations: {} # @schema default: {}
  parentRefs: [] # @schema default: []
  hostnames: [] # @schema default: []

referenceGrant:
  create: false # @schema default: false
  fromNamespaces: [] # @schema default: []

templates:
  deniedTemplateContent: "" # @schema default: ""
  captchaTemplateContent: "" # @schema default: ""
